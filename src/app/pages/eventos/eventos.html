<div class="eventos-container">
  <div class="page-header">
    <h1 class="page-title">Eventos</h1>
    <button class="btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo Evento
    </button>
  </div>

  <div class="filters">
    <button class="filter-btn" [class.active]="filtroAtivo === 'todos'" (click)="setFiltro('todos')">Todos</button>
    <button class="filter-btn" [class.active]="filtroAtivo === 'agendado'" (click)="setFiltro('agendado')">Agendado</button>
    <button class="filter-btn" [class.active]="filtroAtivo === 'em-andamento'" (click)="setFiltro('em-andamento')">Em andamento</button>
    <button class="filter-btn" [class.active]="filtroAtivo === 'encerrado'" (click)="setFiltro('encerrado')">Encerrado</button>
    <button class="filter-btn" [class.active]="filtroAtivo === 'cancelado'" (click)="setFiltro('cancelado')">Cancelado</button>
  </div>

  <div class="eventos-grid">
    @for (evento of eventosFiltrados(); track evento.id) {
      <div class="evento-card" (mouseenter)="evento.hovered = true" (mouseleave)="evento.hovered = false">
        <div class="card-image">
          <img [src]="evento.imagem" [alt]="evento.titulo" />
          <span class="badge" [class]="'badge-' + evento.status">{{ evento.statusLabel }}</span>
        </div>
        <div class="card-body">
          <h3 class="card-title">{{ evento.titulo }}</h3>
          <div class="card-info">
            <div class="info-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
              <span>{{ evento.espaco }}</span>
            </div>
            <div class="info-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span>{{ evento.dataHora }}</span>
            </div>
            <div class="info-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <span>{{ evento.ingressosVendidos }} / {{ evento.capacidade }} ingressos</span>
            </div>
          </div>
          <div class="card-footer">
            <div class="preco">
              <span class="preco-label">PREÇO</span>
              <span class="preco-valor">R$ {{ evento.valor }}</span>
            </div>
            <div class="card-actions">
              <button class="btn-outline">Ver detalhes</button>
              @if (evento.status === 'agendado') {
                <button class="btn-primary btn-sm">Vender</button>
              }
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
