<div class="loteamento-card" [class.novo-card]="isNewCard">
  <ng-container *ngIf="!isNewCard; else novoLoteamento">
    <div class="card-image">
      <img [src]="loteamento.imagemUrl" [alt]="loteamento.nome">
      <span class="status-badge" [class]="'status-' + loteamento.status">
        {{ getStatusLabel() }}
      </span>
    </div>

    <div class="card-content">
      <h3 class="card-title">{{ loteamento.nome }}</h3>
      
      <div class="card-location">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        <span>{{ loteamento.cidade }}, {{ loteamento.estado }}</span>
      </div>

      <div class="card-stats">
        <div class="stat-item">
          <div class="stat-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
              <line x1="15" y1="3" x2="15" y2="21"></line>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="3" y1="15" x2="21" y2="15"></line>
            </svg>
            <span class="stat-label">QUADRAS</span>
          </div>
          <span class="stat-value">{{ loteamento.quadras }}</span>
        </div>

        <div class="stat-item">
          <div class="stat-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="stat-label">LOTES</span>
          </div>
          <span class="stat-value">{{ loteamento.lotes }}</span>
        </div>
      </div>

      <button class="btn-gerenciar" (click)="onGerenciarClick()">
        Gerenciar
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </div>
  </ng-container>

  <ng-template #novoLoteamento>
    <div class="novo-loteamento-content" (click)="onNovoLoteamentoClick()">
      <div class="plus-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </div>
      <h3 class="novo-title">Novo Loteamento</h3>
      <p class="novo-description">
        Cadastre um novo empreendimento e comece a gerenciar suas vendas.
      </p>
    </div>
  </ng-template>
</div>
