<div class="search-bar">
  <span class="search-icon material-icons">search</span>
  <input
    type="text"
    class="search-input"
    [placeholder]="placeholder"
    [value]="value"
    (input)="onInput($event)"
    (keypress)="onKeyPress($event)"
  />
  <button 
    *ngIf="value" 
    class="clear-btn" 
    (click)="onClear()"
    type="button">
    <span class="material-icons">close</span>
  </button>
</div>
